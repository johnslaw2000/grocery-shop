services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: grocery
      POSTGRES_USER: grocery_user
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://grocery_user:root@db:5432/grocery
      SECRET_KEY: dev-secret-change-later
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
